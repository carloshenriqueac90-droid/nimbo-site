<!DOCTYPE html>
<!--
  Um código-fonte, dois jogos (ver i18n/i18n.js):
    pt → "Termo Survival"  em nimbo.games/termo-survival
    en → "Word Survivor"   em nimbo.games/word-survivor

  O idioma é cabeado NO CARREGAMENTO. A FONTE fica sempre em pt (dev default): abrir/servir esta
  pasta = jogo em português, idêntico ao que está no ar. O `publica.ps1` gera as duas pastas do
  site trocando, por idioma: o atributo `lang`/`data-lang` abaixo, o bloco marcado "i18n:head"
  (title/description/OG) e o bloco marcado "i18n:scripts" (pacote de idioma + listas de palavras).
  (NAO escrever marcador de comentario HTML aqui dentro: o fecha-comentario aninhado encerraria
  este comentario antes da hora e o texto abaixo vazaria visivel na pagina. Aconteceu no D33.)

  Nenhuma string de interface fica aqui: tudo vem de i18n/<lang>.js via data-i18n / data-i18n-html /
  data-i18n-attr / data-i18n-logo.
-->
<html lang="en" data-lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="color-scheme" content="dark">
  <meta name="theme-color" content="#1a1114">

  <!--
    Open Graph / Twitter Card: preview de marca genérico (sem a palavra do dia), para o link
    renderizar bem no WhatsApp/X quando alguém compartilhar o resultado.

    Este bloco é PREENCHIDO NO BUILD (publica.ps1) a partir de config.meta do pacote de idioma:
    crawlers de rede social NÃO executam JS, então as tags precisam sair estáticas no HTML
    publicado. Na fonte ficam vazias; ao servir a fonte em dev, o i18n.js as preenche em runtime.

    Subpasta: jogo servido em nimbo.games/<slug>, não subdomínio. `og:image` e `og:url` usam URL
    ABSOLUTA porque crawlers exigem — URL relativa sem host não funciona em OG tags.
    `og-image.png` (1200×630, <300KB) é gerado a partir de `og-image.html` (mesma pasta).
  -->
  <!-- i18n:head:inicio -->
  <title>Word Survivor</title>
  <meta name="description" content="A word roguelike: guess 5-letter words round after round on just 3 lives, cash in coins for power-ups, and see how far you get before the words win. Free, in your browser.">
  <meta property="og:title" content="Word Survivor 🔥">
  <meta property="og:description" content="One 5-letter word, then another, then another. Three lives, coins to spend on power-ups, and words that keep getting meaner. How many rounds can you survive? Free, in your browser.">
  <meta property="og:image" content="https://nimbo.games/word-survivor/og-image.png">
  <meta property="og:url" content="https://nimbo.games/word-survivor/">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:image" content="https://nimbo.games/word-survivor/og-image.png">
  <!-- i18n:head:fim -->

  <link rel="icon" type="image/svg+xml" href="icon.svg">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- brasas flutuando ao fundo (mais brasas surgem nos níveis médio e difícil) -->
  <div class="brasas" aria-hidden="true">
    <span></span><span></span><span></span><span></span><span></span><span></span>
    <span></span><span></span><span></span><span></span><span></span><span></span>
    <span></span><span></span><span></span><span></span><span></span><span></span>
    <span></span><span></span><span></span><span></span><span></span><span></span>
  </div>

  <!-- tela inicial -->
  <section id="tela-inicio">
    <div class="logo">
      <div class="logo-tiles" data-i18n-logo></div>
      <div class="logo-survival"><span data-i18n="logo.sub"></span> <span class="chama">&#128293;</span></div>
    </div>
    <p class="tagline" data-i18n-html="tagline"></p>
    <div class="inicio-stats">
      <div class="ini-stat destaque"><b id="ini-recorde">0</b><span data-i18n="stats.recorde"></span></div>
      <div class="ini-stat"><b id="ini-corridas">0</b><span data-i18n="stats.jogos"></span></div>
      <div class="ini-stat"><b id="ini-rodadas">0</b><span data-i18n="stats.rodadas"></span></div>
    </div>
    <div class="inicio-modos">
      <div class="modo-bloco">
        <button id="btn-jogar-daily" class="botao-fogo" data-i18n="inicio.daily"></button>
        <p id="legenda-daily" class="modo-legenda" data-i18n-html="inicio.dailyLegenda"></p>
        <div id="inicio-travado" class="inicio-travado escondido">
          <p class="travado-titulo" data-i18n="inicio.travadoTitulo"></p>
          <p id="travado-resultado"></p>
          <!-- o <strong id="contagem-amanha"> vive dentro da string de idioma (ordem das palavras
               muda entre idiomas); o id é obrigatório — ver atualizarContagemAmanha() -->
          <p class="travado-contagem" data-i18n-html="inicio.travadoContagem"></p>
        </div>
      </div>
      <div class="modo-bloco">
        <button id="btn-jogar-endless" class="botao-fantasma botao-livre" data-i18n="inicio.endless"></button>
        <p class="modo-legenda" data-i18n-html="inicio.endlessLegenda"></p>
      </div>
    </div>
    <button id="btn-como" class="botao-fantasma" data-i18n="inicio.como"></button>
  </section>

  <!-- jogo -->
  <header id="header-jogo" class="escondido">
    <button class="icone" id="btn-menu" data-i18n-attr="title:header.menu;aria-label:header.menu">&#8962;</button>
    <div class="logo-mini"><strong data-i18n="logo.miniForte"></strong>&nbsp;<span data-i18n="logo.miniResto"></span> <span class="chama">&#128293;</span></div>
    <button class="icone" id="btn-ajuda" data-i18n-attr="title:header.ajuda;aria-label:header.ajuda">?</button>
  </header>

  <main id="jogo" class="escondido">
    <div id="hud" class="hud">
      <span id="hud-vidas" data-i18n-attr="title:hud.vidas">&#10084;&#65039;&#10084;&#65039;&#10084;&#65039;</span>
      <span id="hud-rodada" class="hud-rodada"></span>
      <span id="hud-nivel" class="hud-nivel nivel-facil"></span>
      <span id="hud-moedas" data-i18n-attr="title:hud.moedas">0</span>
    </div>
    <div id="tabuleiro" data-i18n-attr="aria-label:aria.tabuleiro"></div>
    <div id="dicas" class="dicas escondido" data-i18n-attr="aria-label:aria.dicas"></div>
    <div id="powerups" class="powerups" data-i18n-attr="aria-label:aria.powerups">
      <button class="powerup" data-pu="revelar" data-i18n-attr="title:powerups.revelar">&#128161;<span class="preco">6</span></button>
      <button class="powerup" data-pu="eliminar" data-i18n-attr="title:powerups.eliminar">&#128683;<span class="preco">4</span></button>
      <button class="powerup" data-pu="extra" data-i18n-attr="title:powerups.extra">&#10133;<span class="preco">5</span></button>
      <button class="powerup" data-pu="vida" data-i18n-attr="title:powerups.vida">&#10084;&#65039;<span class="preco">12</span></button>
    </div>
    <div id="teclado" data-i18n-attr="aria-label:aria.teclado"></div>
  </main>

  <div id="toast-container"></div>

  <!-- Modal: como jogar -->
  <div class="modal-fundo escondido" id="modal-ajuda">
    <div class="modal">
      <button class="modal-fechar" data-fecha="modal-ajuda">&times;</button>
      <h2 data-i18n="ajuda.titulo"></h2>
      <div data-i18n-html="ajuda.corpo"></div>
      <label class="toggle-contraste">
        <input type="checkbox" id="chk-contraste">
        <span data-i18n="ajuda.contraste"></span>
      </label>
    </div>
  </div>

  <!-- Modal: transições de rodada e fim de jogo -->
  <div class="modal-fundo escondido" id="modal-rodada">
    <div class="modal modal-centro">
      <h2 id="rodada-titulo"></h2>
      <p id="rodada-texto"></p>
      <div class="modal-acoes">
        <button id="btn-continuar" class="botao-acao"></button>
        <button id="btn-compartilhar" class="botao-acao dourado escondido" data-i18n="botoes.compartilhar"></button>
        <button id="btn-sair" class="botao-acao secundario escondido" data-i18n="botoes.menu"></button>
      </div>
    </div>
  </div>

  <!-- i18n:scripts:inicio (en) -->
  <script src="i18n/en.js"></script>
  <script src="palavras_en.js"></script>
  <script src="respostas_en.js"></script>
  <!-- i18n:scripts:fim -->
  <script src="i18n/i18n.js"></script>
  <script src="analytics.js"></script>
  <script src="script.js"></script>
</body>
</html>
