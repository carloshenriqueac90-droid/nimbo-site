<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#1c2418">
  <title>Kingdom Defense</title>
  <link rel="stylesheet" href="./css/style.css">
</head>
<body>
  <div id="jogo">
    <canvas id="tela"></canvas>

    <div id="hud-top">
      <div class="chip">❤️ <span id="hudVidas">20</span></div>
      <div class="chip"><img src="./assets/icone_ouro.png" class="icone-hud" alt="Ouro"> <span id="hudOuro">0</span></div>
      <div class="chip"><img src="./assets/icone_madeira.png" class="icone-hud" alt="Madeira"> <span id="hudMadeira">0</span></div>
      <div class="chip" id="chip-onda">Onda <span id="hudOnda">0/10</span></div>
      <button id="btnMudo" class="chip" type="button" aria-label="Ativar/desativar som">🔊</button>
      <input id="sliderVolume" type="range" min="0" max="100" step="5" aria-label="Volume">
      <div id="barra-onda-fundo"><div id="barraOnda"></div></div>
    </div>

    <div id="hud-bottom">
      <button id="btnOnda">▶ Iniciar Onda</button>
      <button id="btnVel">⏩ x1</button>
      <button id="btnRecuar">🏰 Recuar Trabalhadores</button>
      <button id="btnRetomar">⛏ Retomar Coleta</button>
    </div>

    <div id="menuContexto" class="oculto"></div>
    <div id="toast" class="toast oculto"></div>
    <div id="dica-girar">🔄 Gire o celular para uma visão melhor</div>
    <div id="overlay" class="oculto"></div>
  </div>

  <script type="module" src="./js/main.js"></script>
</body>
</html>
