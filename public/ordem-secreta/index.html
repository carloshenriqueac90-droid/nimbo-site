<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <!-- SEM viewport-fit=cover de propósito: no Android com 3 botões o env(safe-area-inset-bottom)
         costuma reportar 0, então "cover" jogava o conteúdo (Confirmar/tentativas) para baixo da
         barra do sistema e cortava. Sem cover, o navegador mantém o viewport ACIMA das barras do
         sistema (100dvh = área segura), resolvendo o corte de forma independente de env(). -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ordem Secreta</title>

    <!--
      Open Graph / Twitter Card (share-review.md §3): conteúdo genérico e sem spoiler do puzzle
      do dia, para o preview renderizar bem em WhatsApp/X e o cache do WhatsApp (3-7 dias)
      continuar válido sem ficar desatualizado.

      D21 (subpasta): jogo servido em nimbo.games/ordem-secreta, não subdomínio. `og:image` e
      `og:url` usam URL ABSOLUTA (https://nimbo.games/ordem-secreta/...) porque crawlers de
      redes sociais exigem — URL relativa/`/ordem-secreta/...` sem host não funciona em OG tags.
      `public/og-image.png` (1200×630, <300KB) já existe, gerado a partir de `public/og-image.html`.
    -->
    <meta property="og:title" content="Ordem Secreta — o puzzle diário que desafia sua intuição" />
    <meta
      property="og:description"
      content="Ordene 6 itens por um critério. A resposta óbvia quase nunca é a certa. Um puzzle novo todo dia — grátis, 2 minutos."
    />
    <meta property="og:image" content="https://nimbo.games/ordem-secreta/og-image.png" />
    <meta property="og:url" content="https://nimbo.games/ordem-secreta/" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="https://nimbo.games/ordem-secreta/og-image.png" />

    <script type="module" crossorigin src="/ordem-secreta/assets/index-CccpdXY8.js"></script>
    <link rel="stylesheet" crossorigin href="/ordem-secreta/assets/index-BqK1xpON.css">
  </head>
  <body>
    <div id="app"></div>
  </body>
</html>
