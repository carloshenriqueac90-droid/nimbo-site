<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Ordem Secreta</title>

    <!--
      Open Graph / Twitter Card (share-review.md §3): conteúdo genérico e sem spoiler do puzzle
      do dia, para o preview renderizar bem em WhatsApp/X e o cache do WhatsApp (3-7 dias)
      continuar válido sem ficar desatualizado.

      D21 (subpasta): jogo servido em nimbo.games/ordem-secreta, não subdomínio. `og:image` e
      `og:url` usam URL ABSOLUTA (https://nimbo.games/ordem-secreta/...) porque crawlers de
      redes sociais exigem — URL relativa/`/ordem-secreta/...` sem host não funciona em OG tags.
      `public/og-image.png` (1200×630, <300KB) já existe, gerado a partir de `public/og-image.html`.
    -->
    <meta property="og:title" content="Ordem Secreta — o puzzle diário que desafia sua intuição" />
    <meta
      property="og:description"
      content="Ordene 6 itens por um critério. A resposta óbvia quase nunca é a certa. Um puzzle novo todo dia — grátis, 2 minutos."
    />
    <meta property="og:image" content="https://nimbo.games/ordem-secreta/og-image.png" />
    <meta property="og:url" content="https://nimbo.games/ordem-secreta/" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="https://nimbo.games/ordem-secreta/og-image.png" />

    <script type="module" crossorigin src="/ordem-secreta/assets/index-C_p_Hm31.js"></script>
    <link rel="stylesheet" crossorigin href="/ordem-secreta/assets/index-DEYvJKOT.css">
  </head>
  <body>
    <!--
      Fora do #app de propósito: o contêiner do jogo (desktop, ver style.css)
      é um card fechado, e as telas internas usam `.screen-enter` (animação
      de entrada com `transform`, fill-mode `both`), o que cria um novo
      containing block e quebraria `position: fixed` para qualquer link
      injetado dentro dele. Ficando aqui, como irmão de `#app`, o botão
      sempre se posiciona em relação ao viewport de verdade — mas em
      desktop a POSIÇÃO (não o parentesco) é calculada a partir do card
      (ver `.home-link` em style.css), pra ficar "colado" nele em vez de
      solto num canto distante. Conteúdo (seta + "Nimbo") é preenchido pelo
      main.ts (i18n) antes do primeiro paint útil — feedback do CEO: um
      ícone sozinho não deixava claro que o alvo era "voltar ao site".
    -->
    <a class="home-link" href="https://nimbo.games/" id="home-link">
      <span class="home-link__arrow" aria-hidden="true">‹</span><span class="home-link__text">Nimbo</span>
    </a>
    <div id="app"></div>
  </body>
</html>
