<!doctype html>
<!--
  Arte de marca para Open Graph / Twitter Card.

  COMO USAR (antes do deploy):
  1. Abrir este arquivo num browser com viewport exato de 1200x630 (o elemento .canvas já é
     fixo em 1200x630px, então qualquer viewport >= isso serve).
  2. Tirar um screenshot APENAS do elemento `.canvas` (ou da viewport 1200x630 se o browser
     estiver configurado sem zoom/scrollbars) e salvar como PNG.
  3. Otimizar o PNG para <300KB (ex.: pngquant/oxipng) sem perder legibilidade do texto.
  4. Salvar o resultado em `public/og-image.png` (mesma pasta deste arquivo) — é o caminho que
     `index.html` referencia em `og:image`/`twitter:image`.

  Conteúdo: grid de emoji ILUSTRATIVO/genérico (cores de exemplo, não o resultado real de
  nenhum jogador nem de nenhum puzzle específico — evita spoiler acidental em cache/print) +
  logo/tipografia "Ordem Secreta" + a promessa central do jogo. Fundo noturno da marca.
-->
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <title>OG Image — Ordem Secreta</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        background: #0a0b12;
      }

      .canvas {
        position: relative;
        width: 1200px;
        height: 630px;
        overflow: hidden;
        background: radial-gradient(circle at 22% 20%, #1a2050 0%, #10121a 45%, #0a0b12 100%);
        font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
        color: #f4f5fb;
      }

      /* Glow decorativo da marca, canto superior direito. */
      .glow {
        position: absolute;
        top: -180px;
        right: -160px;
        width: 520px;
        height: 520px;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(61, 95, 224, 0.55) 0%, rgba(61, 95, 224, 0) 70%);
      }

      .glow--bottom {
        top: auto;
        right: auto;
        bottom: -220px;
        left: -140px;
        width: 460px;
        height: 460px;
        background: radial-gradient(circle, rgba(61, 95, 224, 0.28) 0%, rgba(61, 95, 224, 0) 70%);
      }

      .content {
        position: relative;
        z-index: 2;
        display: flex;
        align-items: center;
        justify-content: space-between;
        width: 100%;
        height: 100%;
        padding: 0 72px;
      }

      .left {
        display: flex;
        flex-direction: column;
        gap: 22px;
        max-width: 560px;
      }

      .wordmark {
        display: flex;
        align-items: center;
        gap: 14px;
      }

      .wordmark__badge {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 56px;
        height: 56px;
        border-radius: 16px;
        background: linear-gradient(135deg, #3d5fe0 0%, #6f8bff 100%);
        font-size: 30px;
        box-shadow: 0 8px 24px rgba(61, 95, 224, 0.45);
      }

      .wordmark__text {
        font-size: 30px;
        font-weight: 800;
        letter-spacing: 0.5px;
      }

      h1 {
        font-size: 54px;
        line-height: 1.08;
        font-weight: 800;
        letter-spacing: -0.5px;
      }

      h1 .accent {
        color: #8fa4ff;
      }

      .promise {
        font-size: 24px;
        line-height: 1.4;
        color: #c7cbe8;
        font-weight: 400;
      }

      .tagline {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        margin-top: 6px;
        padding: 10px 20px;
        width: fit-content;
        border-radius: 999px;
        background: rgba(61, 95, 224, 0.18);
        border: 1px solid rgba(111, 139, 255, 0.4);
        font-size: 20px;
        font-weight: 600;
        color: #d7deff;
      }

      /* Grid de emoji ilustrativo (genérico, não é o resultado de ninguém). */
      .grid-card {
        display: flex;
        flex-direction: column;
        gap: 10px;
        padding: 28px;
        border-radius: 24px;
        background: rgba(16, 18, 30, 0.72);
        border: 1px solid rgba(111, 139, 255, 0.25);
        box-shadow: 0 30px 60px rgba(0, 0, 0, 0.45);
      }

      .grid-row {
        display: flex;
        gap: 10px;
      }

      .cell {
        width: 56px;
        height: 56px;
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 30px;
      }

      .cell--green {
        background: #2f9e5b;
      }
      .cell--yellow {
        background: #d9a92c;
      }
      .cell--red {
        background: #c8483a;
      }

      .grid-caption {
        margin-top: 6px;
        text-align: center;
        font-size: 16px;
        color: #9aa1c9;
        letter-spacing: 0.3px;
      }
    </style>
  </head>
  <body>
    <div class="canvas">
      <div class="glow"></div>
      <div class="glow glow--bottom"></div>

      <div class="content">
        <div class="left">
          <div class="wordmark">
            <div class="wordmark__badge">🔀</div>
            <div class="wordmark__text">NIMBO GAMES</div>
          </div>
          <h1>Ordem <span class="accent">Secreta</span></h1>
          <p class="promise">
            Ordene 6 itens por um critério todo dia. A resposta óbvia quase nunca é a certa.
          </p>
          <div class="tagline">🧠 Grátis · 2 minutos · um puzzle novo por dia</div>
        </div>

        <div class="grid-card" aria-hidden="true">
          <div class="grid-row">
            <div class="cell cell--green">🟩</div>
            <div class="cell cell--green">🟩</div>
            <div class="cell cell--yellow">🟨</div>
            <div class="cell cell--red">🟥</div>
            <div class="cell cell--red">🟥</div>
            <div class="cell cell--green">🟩</div>
          </div>
          <div class="grid-row">
            <div class="cell cell--green">🟩</div>
            <div class="cell cell--green">🟩</div>
            <div class="cell cell--green">🟩</div>
            <div class="cell cell--green">🟩</div>
            <div class="cell cell--green">🟩</div>
            <div class="cell cell--green">🟩</div>
          </div>
          <p class="grid-caption">exemplo ilustrativo — não é o puzzle de hoje</p>
        </div>
      </div>
    </div>
  </body>
</html>
